server:
    port: 8080

spring:
    kafka:
        consumer:
            bootstrap-servers: localhost:9092
            group-id: group_id
        producer:
            bootstrap-servers: localhost:9092
        topic: message-topic
        superhero-topic: superhero-topic

management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics
    endpoint:
        health:
            show-details: always
info:
    app:
        name: Spring Boot Kafka Demo
        description: Learning project for Kafka producer-consumer patterns
        version: 1.0.0